async function dbSave(table, data){
  try{
    // 기존 데이터 전체 삭제 후 재삽입 (심플하게)
    await sb.from(table).delete().neq('id',0);
    if(data.length>0) await sb.from(table).insert(data);
  }catch(e){ console.error('DB 저장 오류:',table,e); }
}
async function dbLoad(table){ 
  const {data,error}=await sb.from(table).select('*');
  if(error){ console.error('DB 로드 오류:',table,error); return null; }
  return data;
}

// 막대 차트: HTML div 기반 → 모든 화면에서 텍스트 정상
function MiniBarChart({data, keys, colors, height=160}){
  const allV = data.flatMap(d => keys.map(k => d[k]||0));
  const maxV = Math.max(...allV, 1);
  const [tip, setTip] = useState(null);

  return (
    <div style={{position:'relative', userSelect:'none'}}>
      <div style={{display:'flex', alignItems:'flex-end', gap:6, height:height, paddingBottom:0}}>
        {/* Y축 라벨 */}
        <div style={{display:'flex', flexDirection:'column-reverse', justifyContent:'space-between', height:height-24, paddingBottom:4, flexShrink:0, width:36}}>
          {[0, 0.5, 1].map((r,i) => (
            <div key={i} style={{fontSize:10, color:'#64748b', textAlign:'right', lineHeight:1}}>{fmtM(maxV*r)}</div>
          ))}
        </div>
        {/* 막대들 */}
        <div style={{flex:1, display:'flex', alignItems:'flex-end', gap:4, height:'100%', position:'relative'}}>
          {/* 그리드 라인 */}
          {[0.5, 1].map((r,i) => (
            <div key={i} style={{position:'absolute', left:0, right:0, bottom:`${r*(height-24)}px`, height:1, background:'#1e2d3d', pointerEvents:'none'}}/>
          ))}
          {data.map((d, di) => (
            <div key={di} style={{flex:1, display:'flex', flexDirection:'column', height:'100%', minWidth:0}}>
              {/* 막대 영역 */}
              <div style={{flex:1, display:'flex', alignItems:'flex-end', gap:2, paddingBottom:0}}>
                {keys.map((k, ki) => {
                  const pct = ((d[k]||0) / maxV * 100);
                  return (
                    <div key={ki}
                      style={{flex:1, height:`${pct}%`, background:colors[ki], borderRadius:'3px 3px 0 0', minHeight:1, transition:'opacity .15s', cursor:'pointer'}}
                      onMouseEnter={() => setTip({di, k, val: d[k]||0, name: d.name})}
                      onMouseLeave={() => setTip(null)}
                    />
                  );
                })}
              </div>
              {/* X축 라벨 */}
              <div style={{fontSize:11, color:'#64748b', textAlign:'center', paddingTop:4, height:20, flexShrink:0, overflow:'hidden', whiteSpace:'nowrap'}}>{d.name}</div>
            </div>
          ))}
        </div>
      </div>
      {/* 범례 */}
      <div style={{display:'flex', gap:12, marginTop:6, paddingLeft:42}}>
        {keys.map((k, i) => (
          <div key={i} style={{display:'flex', alignItems:'center', gap:4, fontSize:11, color:'#94a3b8'}}>
            <div style={{width:10, height:6, borderRadius:2, background:colors[i], flexShrink:0}}/>
            {k}
          </div>
        ))}
      </div>
      {/* 툴팁 */}
      {tip && (

}

// 라인 차트: SVG, 단 높이를 속성으로 고정하고 좌표계를 퍼센트로
function MiniLineChart({data, dataKey, color='#22c55e', height=120}){
  const vals = data.map(d => d[dataKey]||0);
  const minV = Math.min(...vals), maxV = Math.max(...vals, 1), range = maxV - minV || 1;
  // 퍼센트 좌표계 (0~100) 사용 → preserveAspectRatio none 없이도 자연스럽게 늘어남
  const PL=8, PR=2, PT=8, PB=20; // % 단위
  const cW = 100-PL-PR, cH = 100-PT-PB;
  const pts = data.map((d,i) => ({
    x: PL + (i/(data.length-1||1))*cW,
    y: PT + cH - ((d[dataKey]-minV)/range)*cH,
    v: d[dataKey], n: d.name,
  }));
  const path = pts.map((p,i) => `${i===0?'M':'L'}${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' ');
  const area = `${path} L${pts[pts.length-1].x},${PT+cH} L${pts[0].x},${PT+cH} Z`;
  const [tip, setTip] = useState(null);

  return (
    <div style={{position:'relative'}}>
      <svg
        viewBox="0 0 100 100"
        width="100%"
        height={height}
        preserveAspectRatio="none"
        style={{display:'block', overflow:'visible'}}
      >
        <defs>
          <linearGradient id={`lg_${dataKey}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        {/* 그리드 */}
        {[0, 0.5, 1].map((r,i) => (
          <line key={i} x1={PL} y1={PT+cH*r} x2={100-PR} y2={PT+cH*r} stroke="#1e2d3d" strokeWidth="0.3"/>
        ))}
        {/* 면적 + 라인 */}
        <path d={area} fill={`url(#lg_${dataKey})`}/>
        <path d={path} fill="none" stroke={color} strokeWidth="0.8" strokeLinejoin="round"/>
        {/* 점 */}
        {pts.map((p,i) => (
          <circle key={i} cx={p.x} cy={p.y} r="1.2" fill={color}
            style={{cursor:'pointer'}}
            onMouseEnter={() => setTip(p)}
            onMouseLeave={() => setTip(null)}
          />
        ))}
      </svg>
      {/* X축 라벨: HTML로 분리 → 텍스트 크기 항상 정상 */}
      <div style={{display:'flex', paddingLeft:`${PL}%`, paddingRight:`${PR}%`, marginTop:-4}}>
        {data.map((d,i) => (
          <div key={i} style={{flex:1, textAlign:'center', fontSize:11, color:'#64748b'}}>{d.name}</div>
        ))}
      </div>
      {/* Y축 라벨: HTML */}
      <div style={{position:'absolute', left:0, top:0, height:height, display:'flex', flexDirection:'column', justifyContent:'space-between', paddingTop:`${PT}%`, paddingBottom:`${PB}%`, pointerEvents:'none'}}>
        {[maxV, minV+range*0.5, minV].map((v,i) => (
          <div key={i} style={{fontSize:10, color:'#475569'}}>{fmtM(v)}</div>
        ))}
      </div>
      {/* 툴팁 */}
      {tip && (
        <div style={{position:'absolute', top:4, right:4, background:'#1a2332', border:'1px solid #2d3f53', borderRadius:8, padding:'5px 9px', fontSize:12, pointerEvents:'none'}}>
          <div style={{color:'#94a3b8', fontSize:10}}>{tip.n}</div>
          <div style={{color:color, fontWeight:700}}>{fmtM(tip.v)}</div>
        </div>
      )}
    </div>
  );
}

function DonutChart({data}){
  if(!data.length)return <div style={{textAlign:'center',color:'#64748b',padding:'20px 0',fontSize:13}}>데이터 없음</div>;
  const total=data.reduce((s,d)=>s+d.value,0);
  const cx=50,cy=46,r=28,ir=16;
  let angle=-Math.PI/2;
  const slices=data.map(d=>{const a=(d.value/total)*Math.PI*2;const s={start:angle,end:angle+a,...d};angle+=a;return s;});
  const arc=(cx,cy,r,s,e)=>{const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e),lg=e-s>Math.PI?1:0;return `M${cx},${cy} L${x1},${y1} A${r},${r},0,${lg},1,${x2},${y2} Z`;};
  const [active,setActive]=useState(null);
  return <div>
    <svg viewBox="0 0 100 92" style={{width:140,height:'auto',display:'block',margin:'0 auto'}}>
      {slices.map((s,i)=><path key={i} d={arc(cx,cy,active===i?r+2:r,s.start,s.end)} fill={CC[s.name]||'#64748b'} stroke="#0d1117" strokeWidth="0.6" style={{cursor:'pointer',transition:'all .12s'}} onMouseEnter={()=>setActive(i)} onMouseLeave={()=>setActive(null)}/>)}
      {slices.map((s,i)=><path key={`i${i}`} d={arc(cx,cy,ir,s.start,s.end)} fill="#0d1117"/>)}
      <text x={cx} y={cy-2} textAnchor="middle" fontSize="5.5" fontWeight="700" fill="#f1f5f9">{active!==null?fmtM(slices[active].value):fmtM(total)}</text>
      <text x={cx} y={cy+4} textAnchor="middle" fontSize="4" fill="#64748b">{active!==null?slices[active].name:'합계'}</text>
    </svg>
    <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:6}}>
      {data.sort((a,b)=>b.value-a.value).map((d,i)=><div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:12}}>
        <div style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:7,height:7,borderRadius:2,background:CC[d.name]||'#64748b',flexShrink:0}}/><span style={{color:'#94a3b8'}}>{d.name}</span></div>
        <span style={{color:'#e2e8f0',fontWeight:600}}>{fmtW(d.value)}</span>
      </div>)}
      <div style={{borderTop:'1px solid #2d3f53',marginTop:4,paddingTop:5,display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:700}}>
        <span style={{color:'#64748b'}}>합계</span><span style={{color:'#ef4444'}}>{fmtW(total)}</span>
      </div>
    </div>
  </div>;
}

          const res=[];let cur='',inQ=false;
          for(let i=0;i<l.length;i++){
            if(l[i]==='"'){inQ=!inQ;}
            else if(l[i]===','&&!inQ){res.push(cur.trim());cur='';}
            else cur+=l[i];
          }
          res.push(cur.trim());return res;
        };
        const headers=parseRow(clean(lines[0]));
        const rows=lines.slice(1).filter(l=>l.trim()).map(l=>{
          const vals=parseRow(l);
          const obj={};
          headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/^"|"$/g,'').trim());
          return obj;
        });
        // 자동 매핑 시도
        const autoMap={};

            {n:'③ 발신번호 등록',d:'솔라피 대시보드 → 발신번호 등록 (본인 번호 인증 필요)'},
            {n:'④ 카카오 채널 연동',d:'솔라피 → 카카오 알림톡 채널 연결 후 템플릿 심사 신청'},

            setNewShop({name:'',category:'소모품',qty:'',urgent:false,memo:''});showToast('추가 완료');

          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
            <div><label style={LB}>입주일 (또는 예약 입실일)</label><input className="if" type="date" value={md.moveIn||''} onChange={e=>setMd(p=>({...p,moveIn:e.target.value,reserveDate:e.target.value}))}/></div>
            <div><label style={LB}>계약 만료일</label><input className="if" type="date" value={md.moveOut||''} onChange={e=>setMd(p=>({...p,moveOut:e.target.value}))}/></div>
          </div>
          {md.moveOut&&<div>
            <label style={LB}>계약기간 빠른 조정</label>
            <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
              {[{l:'+1개월',m:1},{l:'+3개월',m:3},{l:'+6개월',m:6},{l:'+1년',m:12},{l:'-1개월',m:-1},{l:'-3개월',m:-3}].map(btn=>(
                <button key={btn.l} className="ab" style={{background:btn.m>0?'#1d4ed822':'#ef444422',color:btn.m>0?'#93c5fd':'#ef4444',padding:'8px 12px',fontSize:12,border:`1px solid ${btn.m>0?'#1d4ed844':'#ef444433'}`}} onClick={()=>{const d=new Date(md.moveOut);d.setMonth(d.getMonth()+btn.m);setMd(p=>({...p,moveOut:fmt(d)}));}}>{btn.l}</button>
              ))}
            </div>
            <div style={{fontSize:11,color:'#64748b',marginTop:5}}>만료일: <strong style={{color:'#e2e8f0'}}>{md.moveOut}</strong></div>
          </div>}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
            <div><label style={LB}>납부일 (매월 몇일)</label><input className="if" type="number" min="1" max="31" value={md.payDay} onChange={e=>setMd(p=>({...p,payDay:e.target.value}))}/></div>
            <div><label style={LB}>보증금 (원)</label><input className="if" type="number" value={md.deposit||''} onChange={e=>setMd(p=>({...p,deposit:e.target.value}))}/></div>
          </div>
          <div><label style={LB}>메모</label><textarea className="if" rows={2} value={md.memo||''} onChange={e=>setMd(p=>({...p,memo:e.target.value}))} placeholder="특이사항" style={{resize:'none'}}/></div>
          <div><label style={LB}>이달 납부 상태</label>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
              <button className="ab" style={{padding:'12px',fontSize:13,fontWeight:600,background:!md.paid?'#ef4444':'#1a2332',color:!md.paid?'#fff':'#94a3b8',border:'1px solid #ef444433'}} onClick={()=>setMd(p=>({...p,paid:false,paidDate:null}))}>미납</button>
              <button className="ab" style={{padding:'12px',fontSize:13,fontWeight:600,background:md.paid?'#22c55e':'#1a2332',color:md.paid?'#fff':'#94a3b8',border:'1px solid #22c55e33'}} onClick={()=>setMd(p=>({...p,paid:true,paidDate:p.paidDate||fmt(today)}))}>납부완료</button>
            </div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9,marginTop:18}}>
          <button className="ab" style={{background:'#1a2332',color:'#94a3b8',border:'1px solid #2d3f53',padding:'13px',fontSize:14}} onClick={()=>setModal(null)}>취소</button>
          <button className="ab" style={{background:'#1d4ed8',color:'#fff',padding:'13px',fontSize:14,fontWeight:700}} onClick={()=>{if(!md.name||!md.roomId){showToast('이름과 방을 선택하세요','error');return;}saveTenant();}}>저장</button>
        </div>
        {md&&md.id&&<button className="ab" style={{width:'100%',background:'#ef444411',color:'#ef4444',border:'1px solid #ef444433',padding:'11px',fontSize:13,fontWeight:600,marginTop:8}} onClick={()=>{if(!window.confirm(`${md?.name}님을 삭제하시겠어요?`))return;syncTenants(tenants.filter(t=>t.id!==md.id));if(md.roomId)syncRooms(rooms.map(r=>r.id===md.roomId?{...r,status:'vacant'}:r));showToast(`${md?.name} 삭제`);setModal(null);}}>🗑️ 입주자 삭제</button>}
      </div>
    </div>}

    {/* ═══ 모달: 계약서 보기 ═══ */}
    {modal==='viewContract'&&md&&<div className="moov" onClick={()=>setModal(null)}>
      <div className="mobox" style={{maxWidth:680,height:'92vh',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:11,flexShrink:0}}>
          <div><div style={{fontSize:15,fontWeight:700}}>{md.name} 계약서</div><div style={{fontSize:11,color:'#64748b'}}>{md.contractName}</div></div>
          <div style={{display:'flex',gap:7,alignItems:'center'}}>
            <button className="ab" style={{background:'#3b82f6',color:'#fff',padding:'8px 14px',fontSize:12}} onClick={()=>window.open(md.contractFile,'_blank')}>새 탭으로 열기</button>
            <button onClick={()=>setModal(null)} style={{background:'none',border:'none',color:'#64748b',fontSize:24,cursor:'pointer',lineHeight:1,padding:'4px 8px'}}>×</button>
          </div>
        </div>
        <div style={{flex:1,borderRadius:11,overflow:'hidden',background:'#0d1117',minHeight:0}}>
          {md.contractFile&&(md.contractName?.toLowerCase().match(/\.pdf$/)?<iframe src={md.contractFile} style={{width:'100%',height:'100%',border:'none'}} title="계약서"/>:<img src={md.contractFile} style={{width:'100%',height:'100%',objectFit:'contain'}} alt="계약서"/>)}
        </div>
      </div>
    </div>}

    {/* ═══ 모달: 공지 ═══ */}
    {modal==='an'&&<div className="moov" onClick={()=>setModal(null)}>
      <div className="mobox" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:17,fontWeight:700,marginBottom:16}}>공지사항 작성</div>
        <div style={{display:'flex',flexDirection:'column',gap:11}}>
          <input className="if" id="nt" placeholder="제목"/>
          <textarea className="if" id="nc" placeholder="내용" rows={4} style={{resize:'none'}}/>
          <label style={{display:'flex',alignItems:'center',gap:9,cursor:'pointer',padding:'3px 0'}}><input type="checkbox" id="ni" style={{width:17,height:17}}/><span style={{fontSize:13,color:'#94a3b8'}}>중요 공지</span></label>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:16}}>
          <button className="ab" style={{background:'#1d4ed8',color:'#fff',padding:'13px',fontSize:14,fontWeight:700}} onClick={()=>{
            const t=document.getElementById('nt').value,c=document.getElementById('nc').value,i=document.getElementById('ni').checked;
            if(!t||!c)return;
            syncNotices([{id:Date.now(),title:t,content:c,important:i,date:fmt(today)},...notices]);
            showToast('공지 등록');setModal(null);
          }}>등록</button>
          <button className="ab" style={{background:'#FEE50022',color:'#FEE500',border:'1px solid #FEE50033',padding:'13px',fontSize:14,fontWeight:700}} onClick={()=>{
            const t=document.getElementById('nt').value,c=document.getElementById('nc').value,i=document.getElementById('ni').checked;
            if(!t||!c)return;
            syncNotices([{id:Date.now(),title:t,content:c,important:i,date:fmt(today)},...notices]);
            const allPhones=tenants.filter(t2=>rooms.find(r=>r.id===t2.roomId)?.status==='occupied').map(t2=>(t2.phone||'').replace(/-/g,'')).filter(Boolean);
            setSmsModal({phones:allPhones,msg:`[고시원 공지] ${t}
${c}`,title:`공지 문자 발송 — ${t}`});
            setModal(null);
          }}>등록 + 바로 문자 발송 💬</button>
          <button className="ab" style={{background:'#1a2332',color:'#94a3b8',border:'1px solid #2d3f53',padding:'11px',fontSize:13}} onClick={()=>setModal(null)}>취소</button>
        </div>
      </div>
    </div>}

    {/* ═══ 모달: 시설 추가 ═══ */}
    {modal==='am'&&<div className="moov" onClick={()=>setModal(null)}>
      <div className="mobox" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:17,fontWeight:700,marginBottom:16}}>시설 관리 항목 추가</div>
        <div style={{display:'flex',flexDirection:'column',gap:11}}>
          <select className="if" id="mr"><option value="">방 선택</option>{rooms.map(r=><option key={r.id} value={r.id}>{r.id}호</option>)}</select>
          <select className="if" id="mc"><option>전기</option><option>배관</option><option>가구</option><option>도어락</option><option>기타</option></select>
          <input className="if" id="mco" placeholder="내용"/>
          <select className="if" id="mp"><option>높음</option><option>보통</option><option>낮음</option></select>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9,marginTop:16}}>
          <button className="ab" style={{background:'#1a2332',color:'#94a3b8',border:'1px solid #2d3f53',padding:'13px',fontSize:14}} onClick={()=>setModal(null)}>취소</button>
          <button className="ab" style={{background:'#1d4ed8',color:'#fff',padding:'13px',fontSize:14,fontWeight:700}} onClick={()=>{const r=parseInt(document.getElementById('mr').value),c=document.getElementById('mco').value;if(!r||!c)return;syncMaint([{id:Date.now(),roomId:r,category:document.getElementById('mc').value,content:c,priority:document.getElementById('mp').value,reportDate:fmt(today),status:'대기'},...maint]);showToast('항목 추가');setModal(null);}}>추가</button>
        </div>
      </div>
    </div>}

    {/* ═══ 모달: 문자 발송 (범용) ═══ */}
    {smsModal&&<div className="moov" onClick={()=>setSmsModal(null)}>
      <div className="mobox" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontSize:16,fontWeight:700}}>{smsModal.title}</div>
          <button onClick={()=>setSmsModal(null)} style={{background:'none',border:'none',color:'#64748b',fontSize:24,cursor:'pointer',lineHeight:1,padding:'4px 8px'}}>×</button>
        </div>
        {/* 수신자 */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:'#64748b',marginBottom:6}}>수신자 ({smsModal.phones.length}명)</div>
          <div style={{background:'#0d1117',borderRadius:10,padding:'10px 12px',fontSize:12,color:'#64748b',lineHeight:1.7,wordBreak:'break-all'}}>
            {smsModal.phones.map((p,i)=><span key={i}>{p}{i<smsModal.phones.length-1?', ':''}</span>)}
          </div>
        </div>
        {/* 메시지 내용 - 편집 가능 */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:'#64748b',marginBottom:6}}>메시지 내용 (수정 가능)</div>
          <textarea className="if" rows={5} style={{resize:'vertical',fontSize:13,lineHeight:1.7}}
            value={smsModal.msg}
            onChange={e=>setSmsModal(p=>({...p,msg:e.target.value}))}
            placeholder="발송할 메시지를 입력하세요"
          />
        </div>
        {/* 발송 버튼 */}
        {(()=>{
          const phones=smsModal.phones.join(',');
          const encoded=encodeURIComponent(smsModal.msg);
          const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
          const smsUrl=isIOS?`sms:${phones}&body=${encoded}`:`sms:${phones}?body=${encoded}`;
          return (
            <a href={smsUrl}
              style={{display:'block',background:'#FEE500',color:'#3C1E1E',padding:'14px',borderRadius:12,fontWeight:700,fontSize:15,textDecoration:'none',textAlign:'center',marginBottom:8}}
              onClick={()=>{showToast(`${smsModal.phones.length}명에게 문자앱 열기 완료`);setSmsModal(null);}}>
              📱 {smsModal.phones.length}명에게 문자 발송
            </a>
          );
        })()}
        <div style={{fontSize:11,color:'#475569',textAlign:'center',lineHeight:1.6}}>
          문자앱이 열리면 수신자가 자동 입력돼요 · 보내기만 누르세요
        </div>
      </div>
    </div>}

    {/* ═══ 모달: 전체 문자 발송 ═══ */}
    {bulkSmsModal&&<div className="moov" onClick={()=>setBulkSmsModal(false)}>
      <div className="mobox" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontSize:17,fontWeight:700}}>💬 전체 문자 발송 ({needsK.length}명)</div>
          <button onClick={()=>setBulkSmsModal(false)} style={{background:'none',border:'none',color:'#64748b',fontSize:24,cursor:'pointer',lineHeight:1,padding:'4px 8px'}}>×</button>
        </div>
        {needsK.length===0
          ?<div style={{textAlign:'center',color:'#64748b',padding:'24px 0'}}>발송 대상 없음 ✓</div>
          :<div>
            {/* 발송 대상 목록 */}
            <div style={{background:'#0d1117',borderRadius:12,padding:'10px 14px',marginBottom:14}}>
              {needsK.map((t,i)=>{const s=getPS(t);return(
                <div key={t.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'7px 0',borderBottom:i<needsK.length-1?'1px solid #1e2d3d':'none'}}>
                  <div><div style={{fontSize:13,fontWeight:600}}>{t.name} <span style={{color:'#64748b',fontSize:11}}>{t.roomId}호</span></div><div style={{fontSize:11,color:s.color}}>{s.label}</div></div>
                  <div style={{fontSize:12,color:'#64748b'}}>{t.phone}</div>
                </div>
              );})}
            </div>
            {/* 메시지 내용 */}
            <div style={{background:'#0d1117',borderRadius:12,padding:'12px 14px',marginBottom:14}}>
              <div style={{fontSize:11,fontWeight:700,color:'#64748b',marginBottom:6}}>발송될 메시지 (공통)</div>
              <div style={{fontSize:13,color:'#cbd5e1',lineHeight:1.7}}>
                [고시원 납부 안내] 이번 달 월세 납부일이 됐습니다. 미납 시 연체료가 발생할 수 있습니다. 계좌: 국민 123-456-789
              </div>
            </div>
            {/* 전체 발송 - iOS/Android 분기 */}
            {(()=>{
              const msg='[고시원 납부 안내] 이번 달 월세 납부일이 됐습니다. 미납 시 연체료가 발생할 수 있습니다. 계좌: 국민 123-456-789';
              const phones=needsK.map(t=>(t.phone||'').replace(/-/g,'')).filter(Boolean);
              const phonesDisplay=needsK.map(t=>t.phone||'').filter(Boolean).join(', ');
              const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
              const encoded=encodeURIComponent(msg);

              const handleSend=()=>{
                // 번호 클립보드 복사
                if(navigator.clipboard){
                  navigator.clipboard.writeText(phones.join(','));
                }
                needsK.forEach(t=>{
                  const room=rooms.find(r=>r.id===t.roomId);
                  setKlog(prev=>[{id:Date.now()+t.id,tenantName:t.name,roomId:room?.id,message:msg,time:new Date().toLocaleTimeString('ko-KR'),status:'📱 문자앱 열림'},...prev]);
                });
                setBulkSmsModal(false);
                showToast('번호 복사 완료! 문자앱에서 붙여넣기 하세요');
                // 문자앱 열기 (메시지만 입력)
                setTimeout(()=>{ window.location.href=`sms:&body=${encoded}`; }, 400);
              };

              return (
                <div>
                  {/* 번호 표시 */}
                  <div style={{background:'#0d1117',borderRadius:10,padding:'10px 14px',marginBottom:10,display:'flex',alignItems:'center',gap:10}}>
                    <div style={{flex:1,fontSize:12,color:'#93c5fd',lineHeight:1.7,wordBreak:'break-all'}}>{phonesDisplay}</div>
                    <button className="ab" style={{background:'#1a2332',color:'#94a3b8',border:'1px solid #2d3f53',padding:'7px 12px',fontSize:12,flexShrink:0}}
                      onClick={()=>{
                        if(navigator.clipboard) navigator.clipboard.writeText(phones.join(','));
                        showToast('번호 복사됨!');
                      }}>복사</button>
                  </div>

                  {isIOS
                    /* ── 아이폰: 2단계 안내 ── */
                    ?<div>
                      <div style={{background:'#f59e0b11',border:'1px solid #f59e0b33',borderRadius:10,padding:'10px 14px',marginBottom:10,fontSize:12,color:'#f59e0b',lineHeight:1.8}}>
                        📱 <strong>아이폰 발송 방법</strong><br/>
                        ① 아래 버튼 → 번호 자동 복사 + 문자앱 열림<br/>
                        ② 받는 사람 칸 길게 누르기 → <strong>붙여넣기</strong><br/>
                        ③ 내용 확인 후 보내기
                      </div>
                      <button className="ab" style={{width:'100%',background:'#FEE500',color:'#3C1E1E',padding:'14px',fontSize:15,fontWeight:700}}
                        onClick={handleSend}>
                        📋 번호 복사 + 문자앱 열기
                      </button>
                    </div>
                    /* ── 안드로이드: 바로 발송 ── */
                    :<a href={`sms:${phones.join(',')}?body=${encoded}`}
                      style={{display:'block',background:'#FEE500',color:'#3C1E1E',padding:'14px',borderRadius:12,fontWeight:700,fontSize:15,textDecoration:'none',textAlign:'center'}}
                      onClick={()=>{
                        needsK.forEach(t=>{const room=rooms.find(r=>r.id===t.roomId);setKlog(prev=>[{id:Date.now()+t.id,tenantName:t.name,roomId:room?.id,message:msg,time:new Date().toLocaleTimeString('ko-KR'),status:'📱 문자앱 열림'},...prev]);});
                        setBulkSmsModal(false);showToast(`${needsK.length}명 문자앱 열기 완료`);
                      }}>
                      📱 {needsK.length}명 한번에 문자 발송
                    </a>
                  }
                </div>
              );
            })()}
          </div>
        }
      </div>
    </div>}

    {/* Toast */}
    {toast&&<div style={{position:'fixed',bottom:26,left:'50%',transform:'translateX(-50%)',background:toast.type==='success'?'#22c55e':'#ef4444',color:'#fff',padding:'12px 20px',borderRadius:40,fontWeight:600,fontSize:14,zIndex:9999,boxShadow:'0 8px 32px rgba(0,0,0,.5)',whiteSpace:'nowrap',pointerEvents:'none'}}>
      {toast.msg}
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
